<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学姐，生日快乐</title>
<style>
:root{
  --pink:#FFD6E0;--pink-deep:#FF8FA3;--red:#E8453C;--red-deep:#D63031;
  --lavender:#E8D5F5;--lavender-deep:#C9A7E8;--mint:#D5F5E3;
  --gold:#E8C872;--gold-light:#F5E6CC;--cream:#FFF8F0;
  --text:#4A3728;--text-light:#8B7A6B;--shadow:rgba(0,0,0,0.08)
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC','Helvetica Neue',sans-serif;color:var(--text);background:var(--cream);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--lavender-deep);border-radius:3px}

/* ===== ENVELOPE OVERLAY ===== */
#envelope-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(180deg,#FFF0F3 0%,#F5E6FF 50%,#E8F0FF 100%);
  transition:opacity 0.6s ease,visibility 0.6s ease
}
#envelope-overlay.opened{opacity:0;visibility:hidden;pointer-events:none}

.envelope-body{
  width:min(340px,85vw);cursor:pointer;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s
}
.envelope-body:hover{transform:scale(1.03);box-shadow:0 20px 60px rgba(255,182,200,0.4)}
.envelope-body:active{transform:scale(0.98)}

/* envelope front (the face with the address text) */
.env-front{
  position:relative;width:100%;padding:40px 30px 30px;
  background:linear-gradient(145deg,#FFE8EE 0%,#FFD6E0 50%,#FFC8D6 100%);
  border-radius:16px;
  box-shadow:0 12px 40px rgba(255,182,200,0.3);
  text-align:center
}
.env-stamp{
  position:absolute;top:15px;right:15px;width:44px;height:52px;
  border:2px dashed var(--pink-deep);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;color:var(--pink-deep);font-family:serif;
  opacity:0.5
}
.env-address{margin-bottom:12px}
.env-address-label{font-size:0.75rem;color:var(--text-light);letter-spacing:0.1em;margin-bottom:4px}
.env-address-name{font-size:1.3rem;font-weight:700;color:var(--text);font-family:serif;letter-spacing:0.05em}
.env-divider{width:60px;height:1px;background:var(--pink);margin:12px auto;opacity:0.5}
.env-message{font-size:0.9rem;color:var(--text-light);line-height:1.6}
.env-wax{
  width:36px;height:36px;border-radius:50%;margin:16px auto 0;
  background:radial-gradient(circle at 40% 40%,#F5D88C,#D4A843);
  display:flex;align-items:center;justify-content:center;
  font-family:serif;font-size:0.9rem;font-weight:700;color:var(--red-deep);
  box-shadow:0 2px 8px rgba(180,140,60,0.3)
}

/* envelope back flap (decorative triangle at bottom) */
.env-flap{
  width:100%;height:0;
  border-left:min(170px,42.5vw) solid transparent;
  border-right:min(170px,42.5vw) solid transparent;
  border-top:90px solid #FFC4D6;
  margin-top:-2px
}

@media(max-width:600px){
  .envelope-body{width:min(300px,88vw)}
  .env-front{padding:30px 20px 24px}
}

/* ===== PETALS ===== */
.petal{position:fixed;width:12px;height:12px;pointer-events:none;z-index:9998;opacity:0;animation:petalFall linear infinite}
.petal::before{content:'';display:block;width:100%;height:100%;border-radius:50% 0 50% 0;background:var(--pink);transform:rotate(-45deg)}
@keyframes petalFall{0%{opacity:0;transform:translateY(-20px) rotate(0deg)}10%{opacity:0.6}90%{opacity:0.4}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== MAIN ===== */
#main-content{opacity:0;transition:opacity 0.8s ease 0.5s}
#main-content.visible{opacity:1}
section{position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:80px 20px;overflow:hidden}
.section-inner{max-width:800px;width:100%;text-align:center;position:relative;z-index:2}

/* ===== HERO ===== */
#hero{min-height:100vh;background:linear-gradient(135deg,#FFF0F3 0%,#F5E6FF 40%,#E8F0FF 100%);position:relative}
#hero-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.3;filter:blur(2px)}
.hero-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(255,240,243,0.5) 0%,rgba(255,248,240,0.85) 100%)}
.hero-title{font-family:serif;font-weight:700;font-size:clamp(2.5rem,8vw,5rem);color:var(--text);line-height:1.3;letter-spacing:0.08em;position:relative;margin-bottom:20px}
.hero-title::after{content:'';display:block;width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0}
.hero-sub{font-family:serif;font-size:clamp(1rem,3vw,1.5rem);color:var(--text-light);letter-spacing:0.15em;margin-top:10px}
.scroll-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);animation:bounce 2s ease infinite;color:var(--text-light);font-size:0.8rem;letter-spacing:0.2em;opacity:0.6}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ===== FIXED VINYL MUSIC BUTTON ===== */
#vinyl-player{
  position:fixed;top:20px;right:20px;z-index:9990;
  width:52px;height:52px;border-radius:50%;cursor:pointer;
  transition:transform 0.3s
}
#vinyl-player:hover{transform:scale(1.1)}
.vinyl-disc{
  width:52px;height:52px;border-radius:50%;position:relative;
  background:
    radial-gradient(circle at center,#333 0%,#333 15%,#111 16%,
    #222 17%,#111 22%,
    #333 23%,#111 30%,
    #222 31%,#111 38%,
    #333 39%,#111 48%,
    #222 49%,#111 58%,
    #333 59%,#111 68%,
    #222 69%,#333 80%,
    #111 81%,#222 90%,
    #333 100%);
  box-shadow:0 3px 14px rgba(0,0,0,0.3);
  transition:box-shadow 0.3s
}
.vinyl-disc.playing{animation:spin 3s linear infinite}
.vinyl-disc.playing{box-shadow:0 3px 14px rgba(0,0,0,0.3),0 0 20px rgba(255,143,163,0.3)}
.vinyl-disc::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle,#FF8FA3 30%,#E8453C 100%);
  box-shadow:0 0 4px rgba(255,143,163,0.5)
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.vinyl-label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:0.45rem;color:rgba(255,255,255,0.7);pointer-events:none;
  font-family:serif;letter-spacing:0.1em;white-space:nowrap
}
.vinyl-tooltip{
  position:absolute;top:62px;right:0;
  background:white;padding:6px 14px;border-radius:8px;
  font-size:0.75rem;color:var(--text-light);white-space:nowrap;
  box-shadow:0 2px 10px var(--shadow);opacity:0;
  transform:translateY(-5px);transition:all 0.3s;pointer-events:none
}
#vinyl-player:hover .vinyl-tooltip{opacity:1;transform:translateY(0)}

/* ===== CAKE ===== */
#cake{background:linear-gradient(180deg,#FFF5F0 0%,#FFF0F5 100%);padding:80px 20px}
.cake-scene{position:relative;display:inline-block;margin-bottom:20px;cursor:pointer}
.cake-img{
  max-width:380px;width:100%;border-radius:20px;display:block;
  box-shadow:0 15px 50px rgba(255,182,200,0.2);
  transition:filter 0.5s
}
.cake-scene.blown .cake-img{filter:brightness(1.08)}




/* blow-out smoke effect */
.smoke{position:absolute;width:6px;height:0;border-radius:50%;background:rgba(200,200,200,0.5);opacity:0;pointer-events:none}
.smoke.go{animation:smokeUp 1s ease-out forwards}
@keyframes smokeUp{
  0%{height:0;opacity:0.6;transform:translateY(0) scale(1)}
  100%{height:40px;opacity:0;transform:translateY(-50px) scale(2)}
}

.cake-label{font-family:serif;font-size:1rem;color:var(--text-light);margin-bottom:15px;transition:opacity 0.5s}
.reveal-text{font-family:serif;font-size:clamp(1.5rem,5vw,2.5rem);font-weight:700;color:var(--text);opacity:0;transform:translateY(20px);transition:all 1s cubic-bezier(0.34,1.56,0.64,1);margin-top:20px}
.reveal-text.show{opacity:1;transform:translateY(0)}
.reveal-sub{font-size:0.9rem;color:var(--text-light);opacity:0;transition:opacity 0.8s 0.5s}
.reveal-sub.show{opacity:1}

/* ===== LIKE BTN ===== */
.like-section{margin-top:25px;display:flex;flex-direction:column;align-items:center;gap:8px}
.like-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 28px;border:2px solid var(--pink-deep);border-radius:25px;background:white;color:var(--pink-deep);font-family:inherit;font-size:0.95rem;cursor:pointer;transition:all 0.3s}
.like-btn:hover{background:var(--pink-deep);color:white;transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,143,163,0.3)}
.like-btn.liked{background:var(--pink-deep);color:white}
.like-btn svg{width:20px;height:20px}
.like-btn.liked svg{fill:white;stroke:white}
.like-count{font-size:0.8rem;color:var(--text-light)}

/* ===== VIDEO ===== */
#video{background:linear-gradient(180deg,#FFF0F5 0%,#F5F0FF 100%);padding:80px 20px}
.section-heading{font-family:serif;font-size:clamp(1.3rem,4vw,1.8rem);margin-bottom:30px;color:var(--text)}
.video-wrapper{position:relative;max-width:700px;margin:0 auto;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.12);background:#000}
.video-wrapper video{width:100%;display:block}
.video-play-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);cursor:pointer;transition:opacity 0.4s}
.video-play-overlay.hidden{opacity:0;pointer-events:none}
.video-play-btn{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;transition:transform 0.3s;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.video-play-overlay:hover .video-play-btn{transform:scale(1.1)}
.video-play-btn::after{content:'';width:0;height:0;border-style:solid;border-width:14px 0 14px 24px;border-color:transparent transparent transparent var(--text);margin-left:4px}

/* ===== ADULTHOOD ===== */
#adulthood{background:linear-gradient(135deg,#FFF0F3 0%,#F5E6FF 30%,#E8F0FF 60%,#D5F5E3 100%);min-height:80vh}
.adulthood-number{font-size:clamp(5rem,15vw,10rem);font-weight:700;background:linear-gradient(135deg,var(--pink-deep),var(--lavender-deep),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:10px}
.adulthood-title{font-family:serif;font-size:clamp(1.5rem,5vw,2.8rem);font-weight:700;color:var(--text);margin-bottom:20px}
.adulthood-desc{font-size:1rem;line-height:2;color:var(--text-light);max-width:500px;margin:0 auto}
.adulthood-stars{margin-top:40px;display:flex;gap:15px;justify-content:center;opacity:0.5}
.adulthood-stars span{font-size:1.5rem;animation:twinkle 2s ease infinite}
.adulthood-stars span:nth-child(2){animation-delay:0.3s}
.adulthood-stars span:nth-child(3){animation-delay:0.6s}
.adulthood-stars span:nth-child(4){animation-delay:0.9s}
.adulthood-stars span:nth-child(5){animation-delay:1.2s}
@keyframes twinkle{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

/* ===== WISH WALL ===== */
#wishwall{background:linear-gradient(180deg,#D5F5E3 0%,var(--cream) 100%);padding:80px 20px}
.wish-scroll{width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;margin:0 auto 30px}
.wish-scroll::-webkit-scrollbar{display:none}
.wish-track{display:flex;gap:14px;padding:10px 5px 20px;width:max-content}
.wish-card{min-width:200px;max-width:200px;padding:18px 16px;border-radius:6px;position:relative;box-shadow:2px 3px 12px rgba(0,0,0,0.1);transition:transform 0.3s,box-shadow 0.3s;cursor:default;flex-shrink:0}
.wish-card:hover{transform:translateY(-4px) rotate(0deg) !important;box-shadow:4px 6px 20px rgba(0,0,0,0.15)}
.wish-card-emoji{font-size:1.4rem;margin-bottom:8px}
.wish-card-text{font-size:0.85rem;line-height:1.5;color:#333;word-break:break-word}
.wish-card-actions{position:absolute;top:6px;right:8px;display:flex;gap:3px;opacity:0;transition:opacity 0.2s}
.wish-card:hover .wish-card-actions{opacity:1}
.wish-card-edit,.wish-card-del{font-size:0.85rem;color:rgba(0,0,0,0.3);cursor:pointer;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all 0.2s;background:rgba(255,255,255,0.7);border:1px solid rgba(0,0,0,0.08)}
.wish-card-edit:hover{background:var(--pink);color:white;border-color:var(--pink-deep);transform:scale(1.1)}
.wish-card-del:hover{background:var(--red);color:white;border-color:var(--red-deep);transform:scale(1.1)}
@keyframes wishFloatIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.wish-input-area,.msg-input-area{
  display:flex;gap:10px;max-width:600px;margin:0 auto;justify-content:center;flex-wrap:wrap;
  background:rgba(255,255,255,0.85);border:2px solid var(--pink);border-radius:18px;
  padding:14px 16px;box-shadow:0 4px 20px rgba(255,214,224,0.25);
  transition:border-color 0.3s,box-shadow 0.3s;
  position:relative
}
.wish-input-area:focus-within,.msg-input-area:focus-within{
  border-color:var(--pink-deep);
  box-shadow:0 4px 20px rgba(255,214,224,0.25),0 0 20px rgba(255,143,163,0.15)
}
.wish-input,.msg-input,.msg-author-input{
  padding:12px 18px;border:2px solid var(--pink);border-radius:22px;
  font-size:0.9rem;font-family:inherit;outline:none;
  transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;
  background:var(--cream);box-sizing:border-box;color:var(--text)
}
.wish-input::placeholder,.msg-input::placeholder,.msg-author-input::placeholder{color:var(--text-light);opacity:0.6}
.wish-input{flex:1;min-width:200px}
.msg-input{flex:1;min-width:180px}
.msg-author-input{flex:0 0 130px;border-color:var(--lavender)}
.msg-author-input:focus{border-color:var(--lavender-deep);box-shadow:0 0 12px rgba(201,167,232,0.2)}
.wish-input:focus,.msg-input:focus{
  border-color:var(--pink-deep);
  box-shadow:0 0 12px rgba(255,143,163,0.2);
  background:white
}
.wish-btn,.msg-btn{
  padding:12px 28px;background:linear-gradient(135deg,var(--pink) 0%,var(--pink-deep) 100%);
  color:white;border:none;border-radius:22px;font-size:0.9rem;font-family:inherit;
  cursor:pointer;transition:transform 0.25s,box-shadow 0.3s;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:0 3px 12px rgba(255,143,163,0.3);position:relative;overflow:hidden
}
.wish-btn::before,.msg-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s
}
.wish-btn:hover::before,.msg-btn:hover::before{left:100%}
.wish-btn:hover,.msg-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 6px 24px rgba(255,143,163,0.45)}
.wish-btn:active,.msg-btn:active{transform:translateY(0) scale(0.98)}

/* ===== Emoji Picker Button ===== */
.emoji-btn{
  width:40px;height:40px;border:2px solid var(--pink);border-radius:12px;
  background:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;transition:all 0.25s;flex-shrink:0;position:relative
}
.emoji-btn:hover{transform:scale(1.15);border-color:var(--pink-deep);box-shadow:0 0 12px rgba(255,143,163,0.2)}
.emoji-btn.active{border-color:var(--pink-deep);background:var(--pink);box-shadow:0 0 12px rgba(255,143,163,0.3)}

/* ===== Emoji Panel ===== */
.emoji-panel{
  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) scale(0.9);
  background:white;border:2px solid var(--pink);border-radius:16px;
  padding:12px;display:grid;grid-template-columns:repeat(8,1fr);gap:6px;
  box-shadow:0 8px 30px rgba(255,143,163,0.25);
  opacity:0;visibility:hidden;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  z-index:100;min-width:300px;pointer-events:none
}
.emoji-panel.show{opacity:1;visibility:visible;transform:translateX(-50%) scale(1);pointer-events:auto}
.emoji-panel::after{
  content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:12px;height:12px;background:white;border-right:2px solid var(--pink);border-bottom:2px solid var(--pink)
}
.emoji-item{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;font-size:1.2rem;
  transition:all 0.2s;border:none;background:transparent
}
.emoji-item:hover{transform:scale(1.35);background:rgba(255,214,224,0.4)}

/* ===== Message List ===== */
.msg-list{max-width:600px;margin:20px auto 0}
.msg-card{
  background:rgba(255,240,245,0.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  border:1.5px solid rgba(255,182,200,0.3);border-radius:16px;
  padding:16px 20px 16px 16px;margin-bottom:12px;
  box-shadow:0 3px 15px rgba(255,182,200,0.12);
  transition:transform 0.3s,box-shadow 0.3s,border-color 0.3s;
  position:relative;overflow:visible
}
.msg-card:hover{
  transform:translateY(-2px) translateX(2px);
  box-shadow:0 8px 25px rgba(255,182,200,0.2);
  border-color:rgba(255,143,163,0.4)
}
.msg-card-meta{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.msg-card-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:0.95rem;color:white;
  border:2.5px solid var(--pink);
  box-shadow:0 2px 8px rgba(255,143,163,0.2)
}
.msg-card-info{display:flex;flex-direction:column;gap:2px}
.msg-card-author{font-weight:600;font-size:0.88rem;color:var(--text)}
.msg-card-time{font-size:0.72rem;color:var(--text-light)}
.msg-card-body{font-size:0.9rem;line-height:1.7;color:var(--text);padding-left:52px}
.msg-card-actions{position:absolute;top:12px;right:12px;display:flex;gap:4px;opacity:0;transition:opacity 0.2s}
.msg-card:hover .msg-card-actions{opacity:1}
.msg-card-edit,.msg-card-del{
  font-size:0.85rem;color:var(--text-light);cursor:pointer;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:all 0.25s;background:rgba(255,255,255,0.8);border:1px solid rgba(255,182,200,0.3)
}
.msg-card-edit:hover{background:var(--pink);color:white;border-color:var(--pink-deep);transform:scale(1.12);box-shadow:0 2px 8px rgba(255,143,163,0.3)}
.msg-card-del:hover{background:var(--red);color:white;border-color:var(--red-deep);transform:scale(1.12);box-shadow:0 2px 8px rgba(232,69,60,0.3)}
@keyframes msgSlideIn{from{opacity:0;transform:translateY(15px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
/* ===== FOOTER ===== */
footer{text-align:center;padding:40px 20px;background:var(--cream);color:var(--text-light);font-size:0.8rem;letter-spacing:0.05em}
footer .heart{color:var(--pink-deep)}
.visitor-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:white;border-radius:20px;font-size:0.8rem;color:var(--text-light);box-shadow:0 2px 10px var(--shadow);margin-top:20px}


/* ===== CONFETTI CELEBRATION ===== */
#confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:99998;pointer-events:none;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;opacity:0;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(0.5)}
}

/* ===== TYPEWRITER ===== */
.typewriter-cursor{display:inline-block;width:2px;height:1em;background:var(--pink-deep);margin-left:3px;animation:blink 0.8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== ENVELOPE GLOW ===== */
.envelope-body{
  position:relative
}
.envelope-body::before{
  content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;
  border-radius:20px;

<script>

  /* ===== SCROLL ANIM ===== */

  ae.forEach(function(el){el.style.opacity='0';el.style.transform='translateY(25px)';el.style.transition='opacity 0.8s ease, transform 0.8s ease';ob.observe(el)});

  /* ===== CAKE: click to blow out ===== */

    setTimeout(function(){

      typewriter('typewriter-target','十八岁生日快乐！',80,function(){
        revealSub.classList.add('show');
      });

  });

  /* ===== CONFETTI ===== */
  var confettiColors=['#FFD6E0','#FF8FA3','#C9A7E8','#E8C872','#D5F5E3','#FFB6C8','#87CEEB','#FF6B8A','#FFD700','#FF4500'];
  var confettiShapes=['circle','rect','star'];
  function launchConfetti(){
    var container=document.getElementById('confetti-container');
    var count=80;
    for(var i=0;i<count;i++){
      (function(idx){
        setTimeout(function(){
          var el=document.createElement('div');
          el.className='confetti-piece';
          var shape=confettiShapes[Math.floor(Math.random()*confettiShapes.length)];
          var color=confettiColors[Math.floor(Math.random()*confettiColors.length)];
          var size=6+Math.random()*10;
          el.style.left=Math.random()*100+'vw';
          el.style.width=size+'px';
          el.style.height=size*(shape==='rect'?0.6:1)+'px';
          el.style.background=color;
          el.style.borderRadius=shape==='circle'?'50%':shape==='star'?'2px':'1px';
          if(shape==='star'){el.style.background=color;el.style.clipPath='polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)'}
          el.style.animationDuration=(2.5+Math.random()*2.5)+'s';
          el.style.animationDelay=(Math.random()*0.8)+'s';
          container.appendChild(el);
          setTimeout(function(){el.remove()},6000);
        },idx*20);
      })(i);
    }
  }

  /* ===== TYPEWRITER ===== */
  function typewriter(elId,text,speed,cb){
    var el=document.getElementById(elId);
    var cursor=document.getElementById('typewriter-cursor');
    var idx=0;
    el.textContent='';
    cursor.style.display='inline-block';
    function type(){
      if(idx<text.length){
        el.textContent+=text.charAt(idx);
        idx++;
        setTimeout(type,speed);
      }else{
        setTimeout(function(){cursor.style.display='none'},2000);
        if(cb)cb();
      }
    }
    type();
  }

  /* ===== LIKE (Waline API) ===== */
  var WL='https://waline-l3sgyy85d-tongluoshao1-3881s-projects.vercel.app';
  var LK_PATH='/birthday-like';
  var likeBtn=document.getElementById('like-btn');
  var likeText=document.getElementById('like-text');
  var likeCountEl=document.getElementById('like-count');
  var cachedLike=localStorage.getItem('birthday_liked')==='true';
  function fetchLikes(){
    var xhr=new XMLHttpRequest();
    xhr.open('GET',WL+'/api/comment?type=pageview&path='+encodeURIComponent(LK_PATH),true);
    xhr.timeout=5000;
    xhr.onload=function(){
      if(xhr.status===200){
        try{var n=JSON.parse(xhr.responseText).data||0;likeCountEl.textContent=n+' 人发来祝福';}
        catch(e){likeCountEl.textContent='0 人发来祝福';}
      }
    };
    xhr.onerror=function(){likeCountEl.textContent='0 人发来祝福';};
    xhr.ontimeout=function(){likeCountEl.textContent='0 人发来祝福';};
    xhr.send();
  }
  fetchLikes();
  likeBtn.addEventListener('click',function(){
    if(cachedLike){
      cachedLike=false;localStorage.removeItem('birthday_liked');
      likeBtn.classList.remove('liked');likeText.textContent='生日快乐';
      fetchLikes();
    }else{
      cachedLike=true;localStorage.setItem('birthday_liked','true');
      likeBtn.classList.add('liked');likeText.textContent='已祝福';
      var xhr2=new XMLHttpRequest();
      xhr2.open('POST',WL+'/api/comment?type=pageview&path='+encodeURIComponent(LK_PATH),true);
      xhr2.onload=function(){
        if(xhr2.status===200){
          try{var n=JSON.parse(xhr2.responseText).data||0;likeCountEl.textContent=n+' 人发来祝福';}
          catch(e){}
        }
      };
      xhr2.send();
    }
  });
  if(cachedLike){likeBtn.classList.add('liked');likeText.textContent='已祝福';}

  /* ===== VIDEO ===== */
  var vid=document.getElementById('birthday-video');
  var vob=new IntersectionObserver(function(e){
    e.forEach(function(en){if(en.isIntersecting)vid.play().catch(function(){});else vid.pause()});
  },{threshold:0.5});
  vob.observe(vid);

  /* ===== WISH WALL (Waline API) ===== */
  var wishColors=['#FFF9C4','#FFE0EC','#E3F2FD','#E8F5E9','#F3E5F5','#FFE0B2','#E0F7FA'];
  var wishEmojis=['✨','★','🌟','🎂','🎉','😊','🌚','🌈','🌸','❤️'];
  var WL_WISH_PATH='/birthday-wishes';
  var defaultWishes=['愿每天都开心快乐！','希望全家健康平安','愿前程似锦，未来可期','希望成绩越来越好！','愿所有美好都如约而至','希望新的一年一切顺利','愿心中所想皆能实现','希望友谊长存！','愿每一个试探都有收获','希望每天都充满阳光','愿努力不被辜负','希望发现更多可能性','愿幸福常伴左右','希望保持好心情','愿梦想成真','希望所爱之人都幸福','愿前路明亮','希望勇敢追梦','愿世间温柔待你','希望坦坦荡荡！','愿身体健康，精神充沛','希望快乐不止！','愿你永远充满活力','希望遇见更好的自己','愿年年有今日，岁岁有今朝','希望每个早晨都充满希望','愿你的世界繁花似锦','希望每一次出发都顺利','愿笑容永远开心','希望新的一年更精彩','愿一切都是最好的安排'];
  var wishTrack=document.getElementById('wish-wall');
  var wishScroll=document.getElementById('wish-scroll');
  var wishInput=document.getElementById('wish-input');
  var wishBtn=document.getElementById('wish-btn');
  var wishes=[];
  function fetchWishes(cb){
    var xhr=new XMLHttpRequest();
    xhr.open('GET',WL+'/api/comment?type=comment&path='+encodeURIComponent(WL_WISH_PATH)+'&pageSize=100&sortBy=insertedAt&order=asc',true);
    xhr.timeout=5000;
    xhr.onload=function(){
      if(xhr.status===200){
        try{var resp=JSON.parse(xhr.responseText);wishes=resp.data||[];if(wishes.length===0){wishes=defaultWishes.map(function(t){return{nick:'',comment:t}});}
          if(cb)cb();}catch(e){wishes=defaultWishes.map(function(t){return{nick:'',comment:t}});if(cb)cb();}
      }else{wishes=defaultWishes.map(function(t){return{nick:'',comment:t}});if(cb)cb();}
    };
    xhr.onerror=function(){wishes=defaultWishes.map(function(t){return{nick:'',comment:t}});if(cb)cb();};
    xhr.ontimeout=function(){wishes=defaultWishes.map(function(t){return{nick:'',comment:t}});if(cb)cb();};
    xhr.send();
  }
  function postWish(text,cb){
    var xhr=new XMLHttpRequest();
    xhr.open('POST',WL+'/api/comment',true);
    xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
    xhr.onload=function(){
      try{var resp=JSON.parse(xhr.responseText);if(resp.data&&resp.data.objectId){saveMyId(resp.data.objectId,'wish');}else if(resp.data&&resp.data.id){saveMyId(resp.data.id,'wish');}}catch(e){}
      if(cb)cb();
    };
    xhr.send('comment='+encodeURIComponent(text)+'&url='+encodeURIComponent(WL_WISH_PATH));
  }
  function deleteWish(id,cb){
    var xhr=new XMLHttpRequest();
    xhr.open('DELETE',WL+'/api/comment/'+id,true);
    xhr.onload=cb;
    xhr.send();
  }
  function getMyIds(){
    try{return JSON.parse(localStorage.getItem('birthday_my_ids')||'[]');}catch(e){return[];}
  }
  function saveMyId(id,type){
    var ids=getMyIds();ids.push({id:id,type:type});
    localStorage.setItem('birthday_my_ids',JSON.stringify(ids));
  }
  function removeMyId(id){
    var ids=getMyIds();
    localStorage.setItem('birthday_my_ids',JSON.stringify(ids.filter(function(item){return item.id!==id})));
  }
  function updateMyId(oldId,newId){
    var ids=getMyIds();
    ids.forEach(function(item){if(item.id===oldId)item.id=newId;});
    localStorage.setItem('birthday_my_ids',JSON.stringify(ids));
  }
  function isMyPost(id){
    return getMyIds().some(function(item){return item.id===id;});
  }
  function createWishCard(data,idx){
    var card=document.createElement('div');card.className='wish-card';
    card.style.background=wishColors[idx%wishColors.length];
    var rot=(Math.random()*6-3).toFixed(1);
    card.style.transform='rotate('+rot+'deg)';
    var emoji=wishEmojis[Math.floor(Math.random()*wishEmojis.length)];
    var cid=data.objectId||data.id||'';
    card.innerHTML='<div class="wish-card-emoji">'+emoji+'</div><div class="wish-card-text">'+escHtml(data.comment||data.text)+'</div>';
    if(cid&&isMyPost(cid)){
      var actions=document.createElement('div');actions.className='wish-card-actions';
      var editBtn=document.createElement('div');editBtn.className='wish-card-edit';editBtn.textContent='✏';editBtn.title='点击修改';
      var del=document.createElement('div');del.className='wish-card-del';del.textContent='×';del.title='点击删除';
      actions.appendChild(editBtn);actions.appendChild(del);card.appendChild(actions);
      (function(c){
        del.addEventListener('click',function(e){e.stopPropagation();
          card.style.opacity='0';card.style.transform='scale(0.5)';
          setTimeout(function(){card.remove();removeMyId(c);deleteWish(c,function(){fetchWishes(function(){renderWishes()})});},300);
        });
        editBtn.addEventListener('click',function(e){e.stopPropagation();
          var txtEl=card.querySelector('.wish-card-text');
          var oldText=txtEl.textContent;
          var inp=document.createElement('input');inp.type='text';inp.value=oldText;inp.maxLength=50;
          inp.style.cssText='width:100%;padding:4px 6px;border:1.5px solid var(--pink-deep);border-radius:8px;font-size:0.82rem;font-family:inherit;outline:none;background:white';
          inp.placeholder='修改你的心愿...';
          txtEl.style.display='none';txtEl.parentNode.insertBefore(inp,txtEl.nextSibling);inp.focus();inp.select();
          actions.style.display='none';
          function finish(){
            var newText=inp.value.trim();
            if(newText&&newText!==oldText){
              deleteWish(c,function(){
                postWish(newText,function(){updateMyId(c,'_pending_'+Date.now());fetchWishes(function(){renderWishes()})});
              });
            }else{inp.remove();txtEl.style.display='';actions.style.display='';}
          }
          inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')finish();if(ev.key==='Escape'){inp.remove();txtEl.style.display='';actions.style.display='';}});
          inp.addEventListener('blur',function(){setTimeout(finish,100);});
        });
      })(cid);
    }
    return card;
  }
  function escHtml(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
  function renderWishes(){
    wishTrack.innerHTML='';
    wishes.forEach(function(data,i){
      var card=createWishCard(data,i);wishTrack.appendChild(card);

    else{wishScroll.scrollBy({left:1})}},30)}
  function stopAutoScroll(){if(autoScrollTimer){clearInterval(autoScrollTimer);autoScrollTimer=null}}
  function resetAutoScroll(){stopAutoScroll();startAutoScroll()}

  var wishObserver=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting)startAutoScroll();else stopAutoScroll()});

  var msgList=document.getElementById('msg-list');
  var msgInput=document.getElementById('msg-input');
  var msgAuthor=document.getElementById('msg-author');
  var msgBtn=document.getElementById('msg-btn');
  var messages=[];
  function fetchMessages(cb){
    var xhr=new XMLHttpRequest();
    xhr.open('GET',WL+'/api/comment?type=comment&path='+encodeURIComponent(WL_MSG_PATH)+'&pageSize=100&sortBy=insertedAt&order=desc',true);
    xhr.timeout=5000;
    xhr.onload=function(){
      if(xhr.status===200){
        try{var resp=JSON.parse(xhr.responseText);messages=resp.data||[];if(messages.length===0){messages=defaultMsgs.slice();}
          if(cb)cb();}catch(e){messages=defaultMsgs.slice();if(cb)cb();}
      }else{messages=defaultMsgs.slice();if(cb)cb();}
    };
    xhr.onerror=function(){messages=defaultMsgs.slice();if(cb)cb();};
    xhr.ontimeout=function(){messages=defaultMsgs.slice();if(cb)cb();};
    xhr.send();
  }
  function postMessage(text,nick,cb){
    var xhr=new XMLHttpRequest();
    xhr.open('POST',WL+'/api/comment',true);
    xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
    var body='comment='+encodeURIComponent(text)+'&url='+encodeURIComponent(WL_MSG_PATH);
    if(nick)body+='&nick='+encodeURIComponent(nick);
    xhr.onload=function(){
      try{var resp=JSON.parse(xhr.responseText);if(resp.data&&resp.data.objectId){saveMyId(resp.data.objectId,'msg');}else if(resp.data&&resp.data.id){saveMyId(resp.data.id,'msg');}}catch(e){}
      if(cb)cb();
    };
    xhr.send(body);
  }
  function deleteMsg(id,cb){
    var xhr=new XMLHttpRequest();
    xhr.open('DELETE',WL+'/api/comment/'+id,true);
    xhr.onload=cb;
    xhr.send();
  }
  function formatTime(iso){
    if(!iso)return '';
    var d=new Date(iso);
    if(isNaN(d.getTime()))return iso;
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  var avatarColors=['#FF8FA3','#C9A7E8','#87CEEB','#98D8C8','#F7DC6F','#E8A87C','#82E0AA','#D7BDE2','#AED6F1','#F0B27A'];
  function getAvatarColor(nick){var h=0;for(var i=0;i<nick.length;i++)h=nick.charCodeAt(i)+((h<<5)-h);return avatarColors[Math.abs(h)%avatarColors.length];}
  function createMsgCard(data){
    var card=document.createElement('div');card.className='msg-card';
    var nick=data.nick||data.author||'匿名';
    var time=formatTime(data.insertedAt||data.time);
    var color=getAvatarColor(nick);
    var initial=nick==='匿名'?'?':nick.charAt(0).toUpperCase();
    var cid=data.objectId||data.id||'';
    card.innerHTML='<div class="msg-card-meta"><div class="msg-card-avatar" style="background:'+color+'">'+escHtml(initial)+'</div><div class="msg-card-info"><span class="msg-card-author">'+escHtml(nick)+'</span><span class="msg-card-time">'+time+'</span></div></div><div class="msg-card-body">'+escHtml(data.comment||data.text)+'</div>';
    if(cid&&isMyPost(cid)){
      var actions=document.createElement('div');actions.className='msg-card-actions';
      var editBtn=document.createElement('div');editBtn.className='msg-card-edit';editBtn.textContent='✏';editBtn.title='点击修改';
      var del=document.createElement('div');del.className='msg-card-del';del.textContent='×';del.title='点击删除';
      actions.appendChild(editBtn);actions.appendChild(del);card.appendChild(actions);
      (function(c){
        del.addEventListener('click',function(e){e.stopPropagation();
          card.style.opacity='0';card.style.transform='translateX(50px) scale(0.95)';
          setTimeout(function(){card.remove();removeMyId(c);deleteMsg(c,function(){fetchMessages(function(){renderMessages()})});},300);
        });
        editBtn.addEventListener('click',function(e){e.stopPropagation();
          var bodyEl=card.querySelector('.msg-card-body');
          var oldText=bodyEl.textContent;
          var ta=document.createElement('textarea');ta.value=oldText;ta.maxLength=200;ta.rows=2;
          ta.style.cssText='width:100%;padding:8px 10px;border:1.5px solid var(--pink-deep);border-radius:10px;font-size:0.85rem;font-family:inherit;outline:none;background:white;resize:vertical;line-height:1.5';
          ta.placeholder='修改你的留言...';
          bodyEl.style.display='none';bodyEl.parentNode.insertBefore(ta,bodyEl.nextSibling);ta.focus();
          actions.style.display='none';
          function finish(){
            var newText=ta.value.trim();
            if(newText&&newText!==oldText){
              deleteMsg(c,function(){
                var savedNick=nick;
                postMessage(newText,savedNick,function(){updateMyId(c,'_pending_'+Date.now());fetchMessages(function(){renderMessages()})});
              });
            }else{ta.remove();bodyEl.style.display='';actions.style.display='';}
          }
          ta.addEventListener('keydown',function(ev){if(ev.key==='Enter'&&(ev.ctrlKey||ev.metaKey))finish();if(ev.key==='Escape'){ta.remove();bodyEl.style.display='';actions.style.display='';}});
          ta.addEventListener('blur',function(){setTimeout(finish,150);});
        });
      })(cid);
    }
    return card;
  }
  function renderMessages(){
    msgList.innerHTML='';
    messages.forEach(function(data,i){
      var card=createMsgCard(data);
      if(i===0){card.style.animation='msgSlideIn 0.5s ease';}
      msgList.appendChild(card);
    });
  }

  function addMessage(){
    var text=msgInput.value.trim();
